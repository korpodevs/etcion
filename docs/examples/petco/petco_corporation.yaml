    end_of_support: ""
    license_cost_annual: 0
    standardization_status: standard

  # --- Databases ---
  - name: Aurora PostgreSQL (Commerce)
    type: Database
    hosts:
      - PawsPlus.com
      - Order Management System
      - Inventory Service
    cloud_provider: AWS
    region: us-east-1
    environment: production
    version: "15.4"
    end_of_support: "2027-11-11"
    license_cost_annual: 0
    standardization_status: standard

  - name: Aurora PostgreSQL (Services)
