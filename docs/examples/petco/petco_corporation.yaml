# -----------------------------------------------------------------------------
# DATA FLOWS
# Each flow traces data movement through the architecture:
#   - name: descriptive flow name
#   - data_entity: which data entity is flowing
#   - stages: ordered list of processing stages
#     - app: application name
#     - process: what happens at this stage
#     - transformation: passthrough | filter | enrich | aggregate | transform
#   - flow_style: real-time | batch | near-real-time
#   - protocol: Kafka | REST | SFTP | JDBC | MQ
#   - contains_pii: true | false
# -----------------------------------------------------------------------------
data_flows:
  - name: Order-to-Cash Flow
    description: End-to-end order processing from customer placement through payment settlement
    data_entity: Order
    contains_pii: true
    stages:
      - app: PawsPlus.com
        process: Capture Order
        transformation: passthrough
      - app: Order Management System
        process: Validate & Route Order
        transformation: enrich
      - app: Inventory Service
        process: Allocate Inventory
        transformation: filter
      - app: Payment Gateway
        process: Authorize Payment
        transformation: enrich
      - app: Warehouse Management System
        process: Pick Pack Ship
        transformation: transform
      - app: Settlement Engine
        process: Settle Payment
        transformation: aggregate
      - app: SAP ERP
        process: Post to General Ledger
        transformation: transform
    legs:
      - from: PawsPlus.com
        to: Order Management System
        flow_style: real-time
        protocol: REST
        avg_volume: 35K orders/day
      - from: Order Management System
        to: Inventory Service
        flow_style: real-time
        protocol: REST
        avg_volume: 40K allocations/day
      - from: Order Management System
        to: Payment Gateway
        flow_style: real-time
        protocol: REST
        avg_volume: 35K authorizations/day
      - from: Order Management System
        to: Warehouse Management System
        flow_style: real-time
        protocol: Kafka
        avg_volume: 38K shipments/day
      - from: Payment Gateway
        to: Settlement Engine
        flow_style: near-real-time
        protocol: Kafka
        avg_volume: 155K transactions/day
      - from: Settlement Engine
        to: SAP ERP
        flow_style: batch
        protocol: SFTP
        avg_volume: 1 file/day

  - name: Customer 360 Sync
    description: Customer profile data flowing from system of record to all consuming systems
    data_entity: Customer
    contains_pii: true
    stages:
      - app: Customer Hub
        process: Master Customer Profile
        transformation: passthrough
      - app: PawsPlus.com
        process: Display Customer Profile
        transformation: filter
      - app: CommsPlatform
        process: Communication Preferences
        transformation: filter
      - app: Enterprise Data Warehouse
        process: Customer Analytics Dataset
        transformation: aggregate
    legs:
      - from: Customer Hub
        to: PawsPlus.com
        flow_style: real-time
        protocol: REST
        avg_volume: 280K lookups/day
      - from: Customer Hub
        to: CommsPlatform
        flow_style: near-real-time
        protocol: Kafka
        avg_volume: 50K updates/day
      - from: Customer Hub
        to: Enterprise Data Warehouse
        flow_style: near-real-time
        protocol: Kafka
        avg_volume: 50K events/day

  - name: Inventory Replenishment Cycle
    description: Inventory data flowing from stores/DCs through demand planning to purchase orders
    data_entity: Inventory Position
    contains_pii: false
    stages:
      - app: Warehouse Management System
        process: Record Stock Movement
        transformation: passthrough
      - app: Inventory Service
        process: Update Inventory Position
        transformation: aggregate
      - app: Demand Planner
        process: Forecast Demand
        transformation: transform
      - app: SAP ERP
        process: Generate Purchase Order
        transformation: transform
      - app: Vendor Portal
        process: Notify Supplier
        transformation: filter
    legs:
      - from: Warehouse Management System
        to: Inventory Service
        flow_style: real-time
        protocol: Kafka
        avg_volume: 85K adjustments/day
      - from: Inventory Service
        to: Demand Planner
        flow_style: near-real-time
        protocol: Kafka
        avg_volume: 150 snapshots/day
      - from: Demand Planner
        to: SAP ERP
        flow_style: batch
        protocol: SOAP
        avg_volume: 200 POs/day
      - from: SAP ERP
        to: Vendor Portal
        flow_style: batch
        protocol: SFTP
        avg_volume: 200 POs/day

  - name: Subscription Autoship Pipeline
    description: Recurring subscription orders from eligibility check through fulfillment
    data_entity: Subscription
    contains_pii: true
    stages:
      - app: PawsCare+ Platform
        process: Evaluate Autoship Eligibility
        transformation: filter
      - app: Payment Gateway
        process: Charge Recurring Payment
        transformation: enrich
      - app: Order Management System
        process: Create Autoship Order
        transformation: transform
      - app: Warehouse Management System
        process: Fulfill Autoship
        transformation: passthrough
    legs:
      - from: PawsCare+ Platform
        to: Payment Gateway
        flow_style: real-time
        protocol: REST
        avg_volume: 12K charges/day
      - from: PawsCare+ Platform
        to: Order Management System
        flow_style: real-time
        protocol: REST
        avg_volume: 12K orders/day
      - from: Order Management System
        to: Warehouse Management System
        flow_style: real-time
        protocol: Kafka
        avg_volume: 12K shipments/day

  - name: Prescription Fulfillment Flow
    description: Vet prescription from clinic through pharmacy to customer notification
    data_entity: Prescription
    contains_pii: true
    stages:
      - app: VetConnect
        process: Record Prescription
        transformation: passthrough
      - app: RxManager
        process: Validate & Queue Prescription
        transformation: enrich
      - app: CommsPlatform
        process: Notify Customer
        transformation: filter
    legs:
      - from: VetConnect
        to: RxManager
        flow_style: real-time
        protocol: REST
        avg_volume: 1.8K prescriptions/day
      - from: RxManager
        to: CommsPlatform
        flow_style: near-real-time
        protocol: Kafka
        avg_volume: 1.8K notifications/day
