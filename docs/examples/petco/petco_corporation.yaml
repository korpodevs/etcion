    end_of_support: "2029-01-09"
    license_cost_annual: 225000
    standardization_status: standard

  - name: erp-on-prem-cluster
    type: VM
    hosts:
      - SAP ERP
    cloud_provider: on-prem
    region: Ashburn DC
    environment: production
    version: RHEL 8
    end_of_support: "2029-05-31"
    license_cost_annual: 85000
